name: Release

# Builds release binaries for Linux x64, Windows x64, Windows ARM64,
# and macOS Apple Silicon. Two ways to trigger:
#
#   1. Push a tag `vX.Y.Z` — a Release is created against that tag.
#   2. "Run workflow" from the Actions tab with a version string
#      (e.g. "0.1.4") — the workflow tags the current commit and
#      publishes a Release on its own. No local git tag command needed.
#
# Running via workflow_dispatch with an EMPTY version input just produces
# uploadable artifacts for testing; no tag and no Release are created.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (no v prefix, e.g. 0.1.4). Leave blank for a test build with no tag/release.'
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  BINARY_NAME: brave-offline-config-editor

jobs:
  # Compute the version once so every matrix build and the release job
  # agree. Also decides whether a Release should be published.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.decide.outputs.version }}
      publish: ${{ steps.decide.outputs.publish }}
    steps:
      - name: Decide version + publish flag
        id: decide
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            PUBLISH="true"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            PUBLISH="true"
          else
            VERSION=""
            PUBLISH="false"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish=$PUBLISH" >> "$GITHUB_OUTPUT"
          echo "Resolved: version='$VERSION' publish=$PUBLISH"

  build:
    name: Build ${{ matrix.name }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - name: windows-arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            ext: ".exe"
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            ext: ""
          # macos-x64 intentionally absent: GitHub's macos-13 Intel runners
          # hit long queue times that stalled the gated release job on v0.1.0.
          # Apple-Silicon Macs (macos-14) build both arches if needed —
          # cross-compile x86_64-apple-darwin via a separate job on macos-14
          # if/when Intel-Mac coverage becomes necessary.

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # eframe's glow backend + Wayland/X11 linkage needs these system libs.
      # Only applies on Linux; macOS and Windows runners already have
      # everything needed.
      - name: Install Linux GUI deps
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev

      # Rewrite Cargo.toml's "0.0.0-dev" placeholder to the resolved version
      # so the produced binary reports the real version via --version.
      # Only happens when the prepare job decided we're publishing.
      - name: Set crate version
        if: needs.prepare.outputs.publish == 'true'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "Setting Cargo.toml version to $VERSION"
          sed -i.bak -E "s/^version = \".*\"/version = \"$VERSION\"/" Cargo.toml
          rm -f Cargo.toml.bak
          grep '^version' Cargo.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}" \
             "dist/${{ env.BINARY_NAME }}-${{ matrix.name }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.name }}
          path: dist/${{ env.BINARY_NAME }}-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: needs.prepare.outputs.publish == 'true'
    steps:
      - name: Checkout source
        # softprops/action-gh-release needs the repo to be checked out so it
        # can resolve refs and create the tag against the current SHA.
        uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Flatten into a single directory
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      # tag_name tells softprops to create the tag on the current SHA when
      # the workflow is triggered by workflow_dispatch. On tag-push triggers
      # the tag already exists and tag_name matches — same effect.
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
