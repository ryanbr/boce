name: Release

# Builds release binaries for Linux x64, Windows x64, macOS Apple Silicon,
# and macOS Intel. Triggered by pushing a version tag (e.g. `v0.1.0`) or
# manually via workflow_dispatch.
#
# On a tag push, a GitHub Release is created automatically and all four
# artifacts are attached. workflow_dispatch runs still produce artifacts but
# don't create a Release (test runs).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: brave-offline-config-editor

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - name: windows-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
          - name: windows-arm64
            runner: windows-latest
            target: aarch64-pc-windows-msvc
            ext: ".exe"
          - name: macos-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            ext: ""
          - name: macos-x64
            runner: macos-13
            target: x86_64-apple-darwin
            ext: ""

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # eframe's glow backend + Wayland/X11 linkage needs these system libs.
      # Only applies on Linux; macOS and Windows runners already have
      # everything needed.
      - name: Install Linux GUI deps
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libgl1-mesa-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          # Name pattern: <binary>-<os+arch>.<ext>  (ext is "" or ".exe")
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}${{ matrix.ext }}" \
             "dist/${{ env.BINARY_NAME }}-${{ matrix.name }}${{ matrix.ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.name }}
          path: dist/${{ env.BINARY_NAME }}-${{ matrix.name }}${{ matrix.ext }}
          if-no-files-found: error

  release:
    name: Attach to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Only create/update a Release when triggered by a tag push.
    # workflow_dispatch runs stop after the build step (artifacts are still
    # downloadable from the Actions run page).
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten into a single directory
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
